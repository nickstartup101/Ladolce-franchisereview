<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<title>ເຄື່ອງມືສ້າງສູດອາຫານ — Recipe Cafe Suit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F2A43;
    --ink-soft:#4C6C87;
    --bg:#F4F7FB;
    --bg-alt:#E2EEF8;
    --card:#FFFFFF;
    --blue:#1D6FB8;
    --blue-dark:#124E85;
    --sky:#5FA8DC;
    --line:rgba(15,42,67,0.12);
    --danger:#B23B3B;
    --success:#2E7D32;
    --orange:#D97706;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans Lao', sans-serif !important;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:1100px;margin:0 auto;padding:24px 20px 60px;}
  
  /* Header UI */
  .hero{
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:2px solid var(--blue);
    padding-bottom:16px;margin-bottom:20px;
    gap:16px;flex-wrap:wrap;
  }
  .hero h1{
    font-family:'Noto Sans Lao', sans-serif !important;
    font-weight:700;
    font-size:28px;
    margin:0 0 4px 0;
    color:var(--blue-dark);
  }
  .hero p{margin:0;color:var(--ink-soft);font-size:13.5px;}
  
  /* Sync status component */
  .sync-bar{
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    font-size:13px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .status-dot{
    width:10px;height:10px;border-radius:50%;
    display:inline-block;
  }
  .status-dot.online{background:var(--success);}
  .status-dot.offline{background:var(--orange);}

  /* Tab strip */
  .tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap;position:relative;z-index:2;}
  .tab{
    padding:12px 16px 10px;
    text-align:center;
    background:var(--bg-alt);
    border:1.5px solid var(--blue);
    border-bottom:none;
    border-radius:10px 10px 0 0;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    transition: all .15s ease;
  }
  .tab.active{
    background:var(--card);
    color:var(--blue-dark);
    padding-bottom:12px;
    margin-top:-2px;
    border-top:3px solid var(--blue);
  }
  .tab:not(.active):hover{background:#D5E7F6;}
  
  .panel{
    background:var(--card);
    border:1.5px solid var(--blue);
    border-radius:0 10px 10px 10px;
    padding:24px;
    min-height:360px;
    box-shadow:0 4px 12px rgba(15,42,67,0.04);
    position:relative;
    z-index:1;
  }

  h2.section-title{
    font-family:'Noto Sans Lao', sans-serif !important;
    font-size:19px;
    font-weight:700;
    margin:0 0 4px 0;
    color:var(--blue-dark);
  }
  .subtext{color:var(--ink-soft);font-size:12.5px;margin:0 0 16px 0;}

  /* Filters & Search */
  .search-row{
    display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;
    align-items: center;
  }
  .search-input{
    flex:1;min-width:200px;
  }

  /* Grid Layouts */
  .grid-2col{
    display:grid;grid-template-columns:1.2fr 0.8fr;gap:20px;
  }
  @media(max-width:768px){
    .grid-2col{grid-template-columns:1fr;}
  }

  /* Ingredients view */
  .peg-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:8px;
    margin-bottom:20px;
    max-height:300px;overflow-y:auto;
    border:1px solid var(--line);
    padding:10px;border-radius:8px;
  }
  .peg{
    border:1px solid var(--line);
    background:#fafafa;
    border-radius:8px;
    padding:8px 12px;
    display:flex;justify-content:space-between;align-items:center;gap:6px;
    font-size:13px;
  }
  .peg.custom{border-color:var(--blue);background:#F0F6FC;}
  .peg .unit-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    background:var(--blue);
    color:#fff;
    padding:1px 6px;
    border-radius:12px;
  }
  .peg .del-btn{
    background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;
    padding:0;opacity:.55;
  }
  .peg .del-btn:hover{opacity:1;}

  /* Inputs and Buttons */
  input,select,textarea{
    font-family:'Noto Sans Lao', sans-serif !important;
    font-size:13px;
    border:1.5px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    background:#fff;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  
  button.btn{
    font-family:'Noto Sans Lao', sans-serif !important;
    font-weight:600;font-size:13px;
    border:none;border-radius:6px;
    padding:8px 14px;
    cursor:pointer;
    background:var(--blue);color:#fff;
    display:inline-flex;align-items:center;gap:6px;
    justify-content:center;
    transition:all .1s ease;
  }
  button.btn:hover{background:var(--blue-dark);}
  button.btn:active{transform:scale(.98);}
  button.btn.secondary{background:var(--bg-alt);color:var(--blue-dark);border:1.5px solid var(--blue);}
  button.btn.secondary:hover{background:#D5E7F6;}
  button.btn.danger{background:var(--danger);color:#fff;}
  button.btn.danger:hover{background:#962E2E;}
  button.btn.small{padding:5px 10px;font-size:12px;border-radius:4px;}
  button.btn:disabled{opacity:.45;cursor:not-allowed;}

  /* SOP View Card styling */
  .sop-card {
    border: 2px solid var(--blue);
    border-radius: var(--radius);
    padding: 20px;
    background: #fff;
    box-shadow: 0 4px 16px rgba(29,111,184,0.08);
  }
  .sop-header {
    border-bottom: 2px dashed var(--line);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .sop-step-list {
    margin-top: 14px;
  }
  .sop-step-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px;
    border-radius: 8px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.15s;
  }
  .sop-step-item:hover { background: var(--bg); }
  .sop-step-item.done {
    background: #E8F5E9;
    text-decoration: line-through;
    color: var(--ink-soft);
  }
  .sop-checkbox {
    width: 18px; height: 18px; margin-top: 2px;
  }

  /* Recipe & Preset Grid */
  .recipe-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  .recipe-card{
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    background:#fff;
    transition:box-shadow .15s;
  }
  .recipe-card:hover{
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
  }
  .recipe-card h3{
    margin:0 0 4px 0;font-size:16px;color:var(--blue-dark);
  }
  .recipe-card-meta{
    font-size:12px;color:var(--ink-soft);margin-bottom:8px;
  }
  .recipe-card-body{
    font-size:12.5px;color:var(--ink-soft);background:var(--bg);padding:8px;border-radius:6px;
  }
  .recipe-actions{
    display:flex;gap:6px;margin-top:10px;justify-content:flex-end;
  }

  /* Toast Notification */
  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;
    padding:8px 16px;border-radius:30px;font-size:12.5px;
    box-shadow:0 6px 18px rgba(15,42,67,.3);
    opacity:0;pointer-events:none;transition:all .2s ease;
    z-index:100;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  /* Form components */
  .form-group {
    margin-bottom: 12px;
  }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 4px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
  }
  .ing-row{
    display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;
  }
  .remove-btn{
    color:var(--danger);font-weight:bold;font-size:16px;border:none;background:none;cursor:pointer;
  }
</style>
</head>
<body>
<div id="root" class="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script>
const { useState, useEffect, useMemo, useRef } = React;

// 42 Default Stock Items

const DEFAULT_CATEGORIES = ["Coffee", "Non coffee", "Matcha", "Tea", "Fresh drink"];
const UNIT_OPTIONS = ["g", "ml", "ໜ່ວຍ", "ຊອງ", "ອັນ"];

function uid(prefix){ return prefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2,6); }

/* --- Export utilities --- */
function csvEscape(v){
  const s = String(v ?? "");
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function exportSingleRecipeCSV(recipe){
  const rows = [["ວັດຖຸດິບ", "ຈຳນວນ", "ຫົວໜ່ວຍ"]];
  recipe.items.forEach(it => rows.push([it.name, it.qty, it.unit]));
  const csv = "\uFEFF" + rows.map(r => r.map(csvEscape).join(",")).join("\n");
  downloadBlob(csv, `${recipe.name || "recipe"}.csv`, "text/csv;charset=utf-8;");
}

/* --- Bulk Print in 2-Column layout with Noto Sans Lao --- */
function printBulkRecipesBook(recipesList) {
  const categoriesMap = {};
  recipesList.forEach(r => {
    let cat = (r.category || "ອື່ນໆ").trim();
    if (!categoriesMap[cat]) categoriesMap[cat] = [];
    categoriesMap[cat].push(r);
  });

  const categoriesHtml = Object.keys(categoriesMap).map(catName => {
    const list = categoriesMap[catName];
    const cardsHtml = list.map(recipe => {
      const steps = (recipe.steps || "").split("\n").filter(s => s.trim());
      return `
        <div class="recipe-card">
          <div class="recipe-header">
            <span class="recipe-title">${recipe.name}</span>
            ${recipe.servings ? `<span class="recipe-servings">ຈຳນວນ: ${recipe.servings} ແກ້ວ/ຈານ</span>` : ""}
          </div>
          <table>
            <thead>
              <tr>
                <th style="text-align: left;">ວັດຖຸດິບ</th>
                <th style="text-align: right; width: 60px;">ປະລິມານ</th>
              </tr>
            </thead>
            <tbody>
              ${recipe.items.map(it => `
                <tr>
                  <td>${it.name}</td>
                  <td style="text-align: right; font-weight: bold;">${it.qty} ${it.unit}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
          <div style="font-weight: bold; font-size: 10px; margin-bottom: 4px; color: #124E85;">ຂັ້ນຕອນ SOP:</div>
          <div class="steps-box">
            ${steps.map((st, idx) => `
              <div class="step-line">
                <span class="step-num">${idx + 1}</span>
                <span>${st}</span>
              </div>
            `).join("")}
          </div>
          ${recipe.notes ? `<div class="notes-box">⚠️ ${recipe.notes}</div>` : ""}
        </div>
      `;
    }).join("");

    return `
      <div class="category-block">
        <h2 class="category-title">${catName}</h2>
        <div class="grid-columns">
          ${cardsHtml}
        </div>
      </div>
    `;
  }).join("");

  const printHtml = `
  <!DOCTYPE html>
  <html lang="lo">
  <head>
    <meta charset="UTF-8">
    <title>ປຶ້ມຄູ່ມືສູດ SOP ທັງໝົດ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @page {
        size: A4;
        margin: 12mm 10mm;
      }
      body {
        font-family: 'Noto Sans Lao', sans-serif !important;
        color: #0F2A43;
        background: #fff;
        margin: 0; padding: 0;
        font-size: 11px;
      }
      .book-title {
        text-align: center;
        border-bottom: 2px solid #124E85;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .book-title h1 {
        margin: 0;
        font-size: 22px;
        color: #124E85;
        font-weight: 700;
      }
      .book-title p {
        margin: 4px 0 0 0;
        font-size: 11px;
        color: #4C6C87;
      }
      .category-block {
        margin-bottom: 24px;
        page-break-inside: auto;
      }
      .category-title {
        background: #E2EEF8;
        color: #124E85;
        font-size: 13px;
        padding: 6px 12px;
        margin: 18px 0 10px 0;
        border-radius: 4px;
        font-weight: bold;
        text-transform: uppercase;
        border-left: 4px solid #1D6FB8;
      }
      .grid-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .recipe-card {
        border: 1px solid #c8d9e6;
        border-radius: 6px;
        padding: 10px;
        background: #fff;
        page-break-inside: avoid;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .recipe-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1.5px solid #1D6FB8;
        padding-bottom: 4px;
        margin-bottom: 6px;
      }
      .recipe-title {
        font-weight: bold;
        font-size: 12px;
        color: #124E85;
      }
      .recipe-servings {
        font-size: 9.5px;
        color: #4C6C87;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8px;
      }
      th {
        font-size: 9px;
        color: #4C6C87;
        padding: 2px 4px;
        background: #f4f7fb;
        border-bottom: 1px solid #1D6FB8;
      }
      td {
        padding: 4px;
        font-size: 10px;
        border-bottom: 1px solid #E2EEF8;
      }
      .steps-box {
        margin-bottom: 6px;
      }
      .step-line {
        display: flex;
        gap: 6px;
        margin-bottom: 3px;
        font-size: 9.5px;
        line-height: 1.3;
      }
      .step-num {
        background: #1D6FB8;
        color: #fff;
        font-size: 8px;
        width: 13px; height: 13px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-weight: bold;
        margin-top: 1px;
      }
      .notes-box {
        background: #FFF9C4;
        padding: 4px 6px;
        border-radius: 3px;
        font-size: 8.5px;
        color: #5D4037;
      }
      @media print {
        body { margin: 0; }
        .grid-columns {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="book-title">
      <h1>ປຶ້ມຄູ່ມືສູດ ແລະ ຂັ້ນຕອນການເຮັດວຽກ SOP ທັງໝົດ</h1>
      <p>Recipe Cafe Suit — ເອກະສານພາຍໃນຫ້ອງຄົວ (ຈັດວາງຮູບແບບ A4 2 Column)</p>
    </div>
    ${categoriesHtml}
    <script>
      window.onload = function() {
        window.print();
      };
    <\/script>
  </body>
  </html>
  `;

  const iframe = document.createElement("iframe");
  iframe.style.position = "fixed";
  iframe.style.bottom = "0"; iframe.style.right = "0";
  iframe.style.width = "0"; iframe.style.height = "0";
  iframe.style.border = "none";
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document;
  doc.open(); doc.write(printHtml); doc.close();
  setTimeout(() => document.body.removeChild(iframe), 3000);
}

function App(){
  const [tab, setTab] = useState("sop");
  const [ingredients, setIngredients] = useState(DEFAULT_INGREDIENTS);
  const [recipes, setRecipes] = useState([]);
  const [presets, setPresets] = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  
  const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem("db_sheet_url") || "");
  const [syncStatus, setSyncStatus] = useState("local");
  const [toastMsg, setToastMsg] = useState("");
  const [toastShow, setToastShow] = useState(false);
  
  const [activeSopRecipe, setActiveSopRecipe] = useState(null);
  const [sopCheckedSteps, setSopCheckedSteps] = useState({});

  const showToast = (msg) => {
    setToastMsg(msg);
    setToastShow(true);
    setTimeout(() => setToastShow(false), 2200);
  };

  // Fetch Cloud data
  const fetchDataFromSheet = async (urlToFetch = sheetUrl) => {
    if (!urlToFetch) {
      setSyncStatus("local");
      return;
    }
    setSyncStatus("loading");
    try {
      const res = await fetch(urlToFetch, { method: "GET" });
      if (res.ok) {
        const data = await res.json();
        if (data.ingredients) setIngredients(data.ingredients.length ? data.ingredients : DEFAULT_INGREDIENTS);
        if (data.recipes) setRecipes(data.recipes);
        if (data.presets) setPresets(data.presets);
        if (data.categories) setCategories(data.categories.length ? data.categories : DEFAULT_CATEGORIES);
        setSyncStatus("synced");
        showToast("ດຶງຂໍ້ມູນຈາກ Google Sheet ສຳເລັດ");
      } else {
        setSyncStatus("error");
        showToast("ດຶງຂໍ້ມູນບໍ່ສຳເລັດ");
      }
    } catch (e) {
      console.error(e);
      setSyncStatus("error");
      showToast("ການເຊື່ອມຕໍ່ຖານຂໍ້ມູນຫຼົ້ມເຫຼວ");
    }
  };

  // Sync / upload cloud data
  const uploadDataToSheet = async (currentIngredients, currentRecipes, currentPresets, currentCategories) => {
    localStorage.setItem("local_ingredients", JSON.stringify(currentIngredients));
    localStorage.setItem("local_recipes", JSON.stringify(currentRecipes));
    localStorage.setItem("local_presets", JSON.stringify(currentPresets));
    localStorage.setItem("local_categories", JSON.stringify(currentCategories));

    if (!sheetUrl) return;
    setSyncStatus("loading");
    try {
      const payload = {
        ingredients: currentIngredients,
        recipes: currentRecipes,
        presets: currentPresets,
        categories: currentCategories
      };
      await fetch(sheetUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      setSyncStatus("synced");
      showToast("ບັນທຶກ ແລະ ຊິງຄ໌ຂໍ້ມູນໄປຍັງ Cloud ແລ້ວ");
    } catch (e) {
      console.error(e);
      setSyncStatus("error");
      showToast("ບໍ່ສາມາດອັບເດດຂໍ້ມູນຂຶ້ນ Cloud ໄດ້");
    }
  };

  useEffect(() => {
    if (sheetUrl) {
      fetchDataFromSheet();
    } else {
      const localIng = localStorage.getItem("local_ingredients");
      const localRec = localStorage.getItem("local_recipes");
      const localPre = localStorage.getItem("local_presets");
      const localCat = localStorage.getItem("local_categories");
      if (localIng) setIngredients(JSON.parse(localIng));
      if (localRec) setRecipes(JSON.parse(localRec));
      if (localPre) setPresets(JSON.parse(localPre));
      if (localCat) setCategories(JSON.parse(localCat));
    }
  }, []);

  const saveConfigUrl = (url) => {
    const cleanUrl = url.trim();
    setSheetUrl(cleanUrl);
    localStorage.setItem("db_sheet_url", cleanUrl);
    if (cleanUrl) {
      fetchDataFromSheet(cleanUrl);
    } else {
      setSyncStatus("local");
      showToast("ຍົກເລີກການເຊື່ອມຕໍ່ Cloud ໃຊ້ງານແບບ Local");
    }
  };

  const addIngredient = (name, unit) => {
    const next = [...ingredients, { id: uid("ing"), name, unit, custom: true }];
    setIngredients(next);
    uploadDataToSheet(next, recipes, presets, categories);
    showToast("ເພີ່ມວັດຖຸດິບແລ້ວ");
  };

  const deleteIngredient = (id) => {
    const next = ingredients.filter(i => i.id !== id);
    setIngredients(next);
    uploadDataToSheet(next, recipes, presets, categories);
  };

  const saveRecipe = (recipe) => {
    const next = [{ ...recipe, id: uid("rec"), createdAt: Date.now() }, ...recipes];
    setRecipes(next);
    uploadDataToSheet(ingredients, next, presets, categories);
    showToast("ບັນທຶກສູດອາຫານແລ້ວ");
    setTab("sop");
  };

  const deleteRecipe = (id) => {
    const next = recipes.filter(r => r.id !== id);
    setRecipes(next);
    uploadDataToSheet(ingredients, next, presets, categories);
    if (activeSopRecipe && activeSopRecipe.id === id) setActiveSopRecipe(null);
  };

  const savePreset = (preset) => {
    const next = [{ ...preset, id: uid("pre"), createdAt: Date.now() }, ...presets];
    setPresets(next);
    uploadDataToSheet(ingredients, recipes, next, categories);
    showToast("ບັນທຶກພຣີເຊັດແລ້ວ");
  };

  const deletePreset = (id) => {
    const next = presets.filter(p => p.id !== id);
    setPresets(next);
    uploadDataToSheet(ingredients, recipes, next, categories);
  };

  const addCustomCategory = (newCat) => {
    const formatted = newCat.trim();
    if (formatted && !categories.includes(formatted)) {
      const next = [...categories, formatted];
      setCategories(next);
      uploadDataToSheet(ingredients, recipes, presets, next);
      showToast("ເພີ່ມໝວດໝູ່ໃໝ່ແລ້ວ");
      return true;
    }
    return false;
  };

  return React.createElement("div", null,
    React.createElement("div", { className: "hero" },
      React.createElement("div", null,
        React.createElement("h1", null, "Recipe Cafe Suit"),
        React.createElement("p", null, "ລະບົບຈັດການສູດເຄື່ອງດື່ມ/ອາຫານ ແລະ ຄູ່ມືພະນັກງານ (SOP)")
      ),
      React.createElement("div", { style: { textAlign: "right" } },
        React.createElement("span", { style: { fontWeight: "bold", color: "var(--blue-dark)" } }, recipes.length + " ສູດໃນລະບົບ")
      )
    ),

    React.createElement("div", { className: "sync-bar" },
      React.createElement("span", { className: `status-dot ${syncStatus === 'synced' ? 'online' : 'offline'}` }),
      React.createElement("span", null, 
        syncStatus === "synced" ? "ເຊື່ອມຕໍ່ Cloud ແລ້ວ" : 
        syncStatus === "loading" ? "ກຳລັງໂຫຼດ/ຊິງຄ໌ຂໍ້ມູນ..." : 
        syncStatus === "error" ? "ການເຊື່ອມຕໍ່ຂັດຂ້ອງ" : "ໂໝດອອຟລາຍ (ຂໍ້ມູນເກັບໃນບຣາວເຊີ)"
      ),
      React.createElement("input", {
        type: "text",
        placeholder: "ວາງ Google Web App URL ທີ່ນີ້ເພື່ອຊິງຄ໌ຂໍ້ມູນ...",
        value: sheetUrl,
        onChange: (e) => saveConfigUrl(e.target.value),
        style: { flex: 1, minWidth: "250px", fontSize: "11px", padding: "4px 8px" }
      }),
      sheetUrl && React.createElement("button", { 
        className: "btn secondary small", 
        onClick: () => fetchDataFromSheet(),
        disabled: syncStatus === "loading"
      }, "🔄 ໂຫຼດຄືນໃໝ່")
    ),

    React.createElement("div", { className: "tabs" },
      [
        { id: "sop", label: "📋 ຄູ່ມື SOP ພະນັກງານ" },
        { id: "builder", label: "➕ ສ້າງສູດອາຫານໃໝ່" },
        { id: "ingredients", label: "📦 ຄັງວັດຖຸດິບ ( " + ingredients.length + " )" },
        { id: "presets", label: "🏪 ພຣີເຊັດຮ້ານ (ສາຂາ)" }
      ].map(t => React.createElement("div", {
        key: t.id,
        className: "tab" + (tab === t.id ? " active" : ""),
        onClick: () => setTab(t.id)
      }, t.label))
    ),

    React.createElement("div", { className: "panel" },
      tab === "sop" ? React.createElement(SOPPanel, { 
        recipes, 
        presets, 
        activeRecipe: activeSopRecipe, 
        setActiveRecipe: setActiveSopRecipe,
        checkedSteps: sopCheckedSteps,
        setCheckedSteps: setSopCheckedSteps,
        onDeleteRecipe: deleteRecipe
      }) :
      tab === "builder" ? React.createElement(BuilderPanel, { ingredients, categories, addCustomCategory, onSave: saveRecipe }) :
      tab === "ingredients" ? React.createElement(IngredientsPanel, { ingredients, addIngredient, deleteIngredient }) :
      React.createElement(PresetsPanel, { recipes, presets, onSave: savePreset, onDelete: deletePreset })
    ),

    React.createElement("div", { className: "toast" + (toastShow ? " show" : "") }, toastMsg)
  );
}

function BuilderPanel({ ingredients, categories, addCustomCategory, onSave }){
  const [name, setName] = useState("");
  const [category, setCategory] = useState(categories[0] || "");
  const [newCatName, setNewCatName] = useState("");
  const [servings, setServings] = useState("");
  const [items, setItems] = useState([{ ingredientId: "", qty: "", unit: "g" }]);
  const [steps, setSteps] = useState("");
  const [notes, setNotes] = useState("");

  const updateItem = (idx, patch) => {
    setItems(prev => prev.map((item, i) => i === idx ? { ...item, ...patch } : item));
  };

  const onIngredientChange = (idx, ingId) => {
    const ing = ingredients.find(i => i.id === ingId);
    updateItem(idx, { ingredientId: ingId, unit: ing ? ing.unit : "g" });
  };

  const addRow = () => setItems(prev => [...prev, { ingredientId: "", qty: "", unit: "g" }]);
  const removeRow = (idx) => setItems(prev => prev.filter((_, i) => i !== idx));

  const handleAddNewCategory = (e) => {
    e.preventDefault();
    if(addCustomCategory(newCatName)) {
      setCategory(newCatName.trim());
      setNewCatName("");
    }
  };

  const submitRecipe = () => {
    if (!name.trim()) return;
    const recipeItems = items
      .filter(it => it.ingredientId && it.qty)
      .map(it => {
        const ing = ingredients.find(i => i.id === it.ingredientId);
        return { name: ing ? ing.name : "", qty: it.qty, unit: it.unit };
      });
    onSave({
      name: name.trim(),
      category: category || "ອື່ນໆ",
      servings: servings.trim(),
      items: recipeItems,
      steps,
      notes
    });
  };

  return React.createElement("div", null,

    React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: "10px", marginBottom: "16px" } },
      React.createElement("div", { className: "form-group" },
        React.createElement("label", null, "ຊື່ສູດອາຫານ/ເຄື່ອງດື່ມ"),
        React.createElement("input", { type: "text", placeholder: "ເຊັ່ນ: ໂກ້ໂກ້ເຢັນ ຫວານປານກາງ", value: name, onChange: e => setName(e.target.value) })
      ),
      React.createElement("div", { className: "form-group" },
        React.createElement("label", null, "ໝວດໝູ່ເຄື່ອງດື່ມ"),
        React.createElement("select", { value: category, onChange: e => setCategory(e.target.value) },
          categories.map(c => React.createElement("option", { key: c, value: c }, c))
        )
      ),
      React.createElement("div", { className: "form-group" },
        React.createElement("label", null, "ຂະໜາດເສີບ (ບໍ່ບັງຄັບ — ເຊັ່ນ: 16oz / 1 ແກ້ວ)"),
        React.createElement("input", { type: "text", placeholder: "ເຊັ່ນ: 16oz, 22oz", value: servings, onChange: e => setServings(e.target.value) })
      )
    ),

    // Fast Category Add Sub-form
    React.createElement("div", { style: { background: "#F0F4F8", padding: "10px 14px", borderRadius: "8px", marginBottom: "16px", display: "flex", gap: "8px", alignItems: "center" } },
      React.createElement("span", { style: { fontSize: "11px", fontWeight: "bold", color: "var(--ink-soft)" } }, "➕ ເພີ່ມໝວດໝູ່ໃໝ່:"),
      React.createElement("input", { 
        type: "text", 
        placeholder: "ຊື່ໝວດໝູ່ໃໝ່...", 
        value: newCatName, 
        onChange: e => setNewCatName(e.target.value),
        style: { flex: 1, padding: "4px 8px" }
      }),
      React.createElement("button", { className: "btn small", onClick: handleAddNewCategory }, "ເພີ່ມ")
    ),

    React.createElement("div", { style: { marginBottom: "16px" } },
      React.createElement("label", { style: { display: "block", fontSize: "12px", fontWeight: "600", marginBottom: "6px", color: "var(--ink-soft)" } }, "ສ່ວນປະສົມໃນສູດ"),
      items.map((it, idx) => React.createElement("div", { key: idx, className: "ing-row" },
        React.createElement("select", { value: it.ingredientId, onChange: e => onIngredientChange(idx, e.target.value) },
          React.createElement("option", { value: "" }, "— ເລືອກວັດຖຸດິບ —"),
          ingredients.map(ing => React.createElement("option", { key: ing.id, value: ing.id }, `${ing.name} (${ing.unit})`))
        ),
        React.createElement("input", { type: "number", placeholder: "ຈຳນວນ", value: it.qty, onChange: e => updateItem(idx, { qty: e.target.value }) }),
        React.createElement("select", { value: it.unit, onChange: e => updateItem(idx, { unit: e.target.value }) },
          UNIT_OPTIONS.map(u => React.createElement("option", { key: u, value: u }, u))
        ),
        React.createElement("button", { className: "remove-btn", onClick: () => removeRow(idx), disabled: items.length === 1 }, "✕")
      )),
      React.createElement("button", { className: "btn secondary small", style: { marginTop: "6px" }, onClick: addRow }, "➕ ເພີ່ມວັດຖຸດິບ")
    ),

    React.createElement("div", { className: "form-group" },
      React.createElement("label", null, "ຂັ້ນຕອນການເຮັດ (ຂຶ້ນແຖວໃໝ່ໃນແຕ່ລະຂັ້ນຕອນ ເພື່ອໃຫ້ສະແດງເປັນ Check-list ສໍາລັບ SOP)"),
      React.createElement("textarea", { 
        rows: "4", 
        placeholder: "ຂັ້ນຕອນທີ 1. ຕັກນ້ຳກ້ອນໃສ່ແກ້ວ...\nຂັ້ນຕອນທີ 2. ຖອກນົມສົດ 120ml...\nຂັ້ນຕອນທີ 3. ລາດຊ໋ອດໂກ້ໂກ້ເຂັ້ມຂຸ້ນດ້ານເທິງ...", 
        value: steps, 
        onChange: e => setSteps(e.target.value) 
      })
    ),

    React.createElement("div", { className: "form-group" },
      React.createElement("label", null, "ໝາຍເຫດ/ຂໍ້ຄວນລະວັງອື່ນໆ"),
      React.createElement("input", { type: "text", placeholder: "ເຊັ່ນ: ຕ້ອງຄົນໃຫ້ເຂົ້າກັນກ່ອນເສີບ, ຫ້າມໃສ່ໝາກນາວຫຼາຍເກີນໄປ", value: notes, onChange: e => setNotes(e.target.value) })
    ),

    React.createElement("div", { style: { display: "flex", justifyContent: "flex-end", marginTop: "16px" } },
      React.createElement("button", { className: "btn", onClick: submitRecipe, disabled: !name.trim() }, "💾 ບັນທຶກສູດອາຫານ")
    )
  );
}

function IngredientsPanel({ ingredients, addIngredient, deleteIngredient }){
  const [name, setName] = useState("");
  const [unit, setUnit] = useState("g");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (name.trim()) {
      addIngredient(name.trim(), unit);
      setName("");
    }
  };

  return React.createElement("div", null,
    React.createElement("h2", { className: "section-title" }, "ຄັງວັດຖຸດິບ"),
    React.createElement("p", { className: "subtext" }, "ວັດຖຸດິບທັງໝົດທີ່ມີໃນລະບົບ ເພື່ອເອົາໄປປະກອບໃນການສ້າງສູດ"),
    
    React.createElement("div", { className: "peg-grid" },
      ingredients.map(ing => React.createElement("div", { key: ing.id, className: "peg" + (ing.custom ? " custom" : "") },
        React.createElement("span", null, ing.name),
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
          React.createElement("span", { className: "unit-tag" }, ing.unit),
          ing.custom && React.createElement("button", { className: "del-btn", onClick: () => deleteIngredient(ing.id) }, "✕")
        )
      ))
    ),

    React.createElement("form", { onSubmit: handleSubmit, style: { display: "flex", gap: "8px", borderTop: "1px dashed var(--line)", paddingTop: "14px" } },
      React.createElement("input", { 
        type: "text", 
        placeholder: "ຊື່ວັດຖຸດິບໃໝ່... ເຊັ່ນ: ນົມສົດ Meiji", 
        value: name, 
        onChange: e => setName(e.target.value),
        style: { flex: 2 }
      }),
      React.createElement("select", { value: unit, onChange: e => setUnit(e.target.value), style: { flex: 1 } },
        UNIT_OPTIONS.map(u => React.createElement("option", { key: u, value: u }, u))
      ),
      React.createElement("button", { type: "submit", className: "btn" }, "➕ ເພີ່ມ")
    )
  );
}

function PresetsPanel({ recipes, presets, onSave, onDelete }){
  const [name, setName] = useState("");
  const [selected, setSelected] = useState({});

  const toggleRecipe = (id) => {
    setSelected(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const selectedIds = Object.keys(selected).filter(id => selected[id]);

  const handleSubmit = () => {
    if (name.trim() && selectedIds.length > 0) {
      onSave({ name: name.trim(), recipeIds: selectedIds });
      setName("");
      setSelected({});
    }
  };

  return React.createElement("div", { className: "grid-2col" },
    React.createElement("div", null,
      React.createElement("h2", { className: "section-title" }, "ສ້າງພຣີເຊັດເມນູ ສະເພາະສາຂາ/ຮ້ານ"),
      React.createElement("p", { className: "subtext" }, "ເລືອກເມນູສະເພາະຮ້ານ ຫຼື ສາຂາຂອງທ່ານ ເພື່ອໃຫ້ພະນັກງານເບິ່ງສະເພາະສູດທີ່ຂາຍໃນຮ້ານນັ້ນໆ"),
      
      React.createElement("div", { className: "form-group" },
        React.createElement("label", null, "ຊື່ສາຂາ/ຮ້ານ"),
        React.createElement("input", { type: "text", placeholder: "ເຊັ່ນ: ຮ້ານ A (ສາຂາ 1)", value: name, onChange: e => setName(e.target.value) })
      ),

      React.createElement("label", { style: { display: "block", fontSize: "12px", fontWeight: "600", marginBottom: "8px", color: "var(--ink-soft)" } }, "ເລືອກສູດທີ່ຈະຂາຍໃນຮ້ານນີ້"),
      React.createElement("div", { style: { maxHeight: "200px", overflowY: "auto", border: "1px solid var(--line)", borderRadius: "8px", padding: "10px" } },
        recipes.map(r => React.createElement("label", { 
          key: r.id, 
          style: { display: "flex", alignItems: "center", gap: "8px", padding: "6px 0", cursor: "pointer", borderBottom: "1px solid var(--line)" } 
        },
          React.createElement("input", { type: "checkbox", checked: !!selected[r.id], onChange: () => toggleRecipe(r.id) }),
          React.createElement("span", { style: { fontSize: "13px" } }, r.name)
        ))
      ),
      React.createElement("button", { 
        className: "btn", 
        style: { marginTop: "12px", width: "100%" }, 
        onClick: handleSubmit,
        disabled: !name.trim() || selectedIds.length === 0
      }, "💾 ບັນທຶກພຣີເຊັດ")
    ),

    React.createElement("div", null,
      React.createElement("h2", { className: "section-title" }, "ລາຍການພຣີເຊັດ"),
      React.createElement("div", { className: "recipe-grid", style: { marginTop: "14px" } },
        presets.length === 0 ? React.createElement("p", { style: { color: "var(--ink-soft)" } }, "ຍັງບໍ່ມີພຣີເຊັດສາຂາ") :
        presets.map(p => {
          const matchedRecipes = recipes.filter(r => p.recipeIds.includes(r.id));
          return React.createElement("div", { key: p.id, className: "recipe-card" },
            React.createElement("h3", null, p.name),
            React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: "4px", marginTop: "6px" } },
              matchedRecipes.map(r => React.createElement("span", { 
                key: r.id, 
                style: { background: "var(--bg-alt)", fontSize: "11px", padding: "2px 8px", borderRadius: "10px" } 
              }, r.name))
            ),
            React.createElement("div", { className: "recipe-actions" },
              React.createElement("button", { className: "btn danger small", onClick: () => onDelete(p.id) }, "ລຶບ")
            )
          );
        })
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
